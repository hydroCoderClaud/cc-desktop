name: Test Qiniu Upload Speed

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest
    env:
      QINIU_AK: ${{ secrets.QINIU_ACCESS_KEY }}
      QINIU_SK: ${{ secrets.QINIU_SECRET_KEY }}
      BUCKET: cc-desktop-releases
      UP_HOST: https://up-cn-east-2.qiniup.com
    steps:
      - name: Generate test files
        run: |
          dd if=/dev/urandom of=test-140mb.bin bs=1M count=140
          dd if=/dev/urandom of=test-150mb.bin bs=1M count=150
          dd if=/dev/urandom of=test-blockmap.bin bs=1K count=150
          echo "version: 1.6.69" > test-latest.yml
          ls -lh test-*

      - name: Setup Python
        run: pip install qiniu

      - name: Generate upload tokens
        run: |
          python3 << 'PYEOF'
          import qiniu, os
          ak = os.environ['QINIU_AK']
          sk = os.environ['QINIU_SK']
          bucket = os.environ['BUCKET']
          auth = qiniu.Auth(ak, sk)
          for fname in ['test-140mb.bin','test-150mb.bin','test-blockmap.bin','test-latest.yml']:
              token = auth.upload_token(bucket, fname, 3600)
              safe_name = fname.replace('.','_').replace('-','_')
              with open(f'token_{safe_name}', 'w') as f:
                  f.write(token)
              print(f"Token generated for {fname}")
          PYEOF

      - name: Upload test-140mb (Windows exe)
        run: |
          TOKEN=$(cat token_test_140mb_bin)
          echo "=== Uploading 140MB ==="
          START=$SECONDS
          curl -s -o /dev/null -w "HTTP %{http_code}, Time: %{time_total}s, Speed: %{speed_upload}\n" \
            -F "file=@test-140mb.bin" \
            -F "token=$TOKEN" \
            -F "key=test-140mb.bin" \
            "$UP_HOST"
          echo "Wall time: $(( SECONDS - START ))s"

      - name: Upload test-150mb (macOS dmg)
        run: |
          TOKEN=$(cat token_test_150mb_bin)
          echo "=== Uploading 150MB ==="
          START=$SECONDS
          curl -s -o /dev/null -w "HTTP %{http_code}, Time: %{time_total}s, Speed: %{speed_upload}\n" \
            -F "file=@test-150mb.bin" \
            -F "token=$TOKEN" \
            -F "key=test-150mb.bin" \
            "$UP_HOST"
          echo "Wall time: $(( SECONDS - START ))s"

      - name: Upload small files (blockmap + yml)
        run: |
          for f in test-blockmap.bin test-latest.yml; do
            safe=$(echo $f | tr '.-' '__')
            TOKEN=$(cat "token_$safe")
            echo "=== Uploading $f ==="
            curl -s -o /dev/null -w "HTTP %{http_code}, Time: %{time_total}s\n" \
              -F "file=@$f" \
              -F "token=$TOKEN" \
              -F "key=$f" \
              "$UP_HOST"
          done

      - name: Summary
        run: |
          echo "========================================="
          echo "  Qiniu Upload Speed Test Complete"
          echo "  Bucket: cc-desktop-releases"
          echo "  Region: cn-east-2 (华东-浙江)"
          echo "========================================="
