name: Test Qiniu Upload Speed

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Generate test files
        run: |
          echo "=== Generating test files ==="
          dd if=/dev/urandom of=test-140mb.bin bs=1M count=140
          dd if=/dev/urandom of=test-150mb.bin bs=1M count=150
          dd if=/dev/urandom of=test-blockmap.bin bs=1K count=150
          echo "version: 1.6.69" > test-latest.yml
          ls -lh test-*

      - name: Setup Python and qiniu SDK
        run: |
          pip install qiniu

      - name: Upload test-140mb (simulate Windows exe)
        env:
          QINIU_AK: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SK: ${{ secrets.QINIU_SECRET_KEY }}
        run: |
          echo "=== Uploading 140MB file ==="
          python3 -c "
          import qiniu, time, os
          ak, sk = os.environ['QINIU_AK'], os.environ['QINIU_SK']
          auth = qiniu.Auth(ak, sk)
          token = auth.upload_token('cc-desktop-releases', 'test-140mb.bin', 3600)
          start = time.time()
          ret, info = qiniu.put_file(token, 'test-140mb.bin', 'test-140mb.bin')
          elapsed = time.time() - start
          size_mb = 140
          print(f'Status: {info.status_code}')
          print(f'Time: {elapsed:.1f}s')
          print(f'Speed: {size_mb/elapsed:.1f} MB/s')
          assert info.status_code == 200, f'Upload failed: {info}'
          "

      - name: Upload test-150mb (simulate macOS dmg)
        env:
          QINIU_AK: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SK: ${{ secrets.QINIU_SECRET_KEY }}
        run: |
          echo "=== Uploading 150MB file ==="
          python3 -c "
          import qiniu, time, os
          ak, sk = os.environ['QINIU_AK'], os.environ['QINIU_SK']
          auth = qiniu.Auth(ak, sk)
          token = auth.upload_token('cc-desktop-releases', 'test-150mb.bin', 3600)
          start = time.time()
          ret, info = qiniu.put_file(token, 'test-150mb.bin', 'test-150mb.bin')
          elapsed = time.time() - start
          size_mb = 150
          print(f'Status: {info.status_code}')
          print(f'Time: {elapsed:.1f}s')
          print(f'Speed: {size_mb/elapsed:.1f} MB/s')
          assert info.status_code == 200, f'Upload failed: {info}'
          "

      - name: Upload small files (simulate blockmap + yml)
        env:
          QINIU_AK: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SK: ${{ secrets.QINIU_SECRET_KEY }}
        run: |
          echo "=== Uploading small files ==="
          python3 -c "
          import qiniu, time, os
          ak, sk = os.environ['QINIU_AK'], os.environ['QINIU_SK']
          auth = qiniu.Auth(ak, sk)
          for fname, label in [('test-blockmap.bin','blockmap'), ('test-latest.yml','latest.yml')]:
              token = auth.upload_token('cc-desktop-releases', fname, 3600)
              start = time.time()
              ret, info = qiniu.put_file(token, fname, fname)
              elapsed = time.time() - start
              size = os.path.getsize(fname) / 1024
              print(f'{label}: {info.status_code}, {elapsed:.2f}s, {size:.0f}KB')
          "

      - name: Summary
        run: |
          echo "========================================="
          echo "  Qiniu Upload Speed Test Complete"
          echo "  Bucket: cc-desktop-releases"
          echo "  Region: cn-east-2 (华东-浙江)"
          echo "  Runner: ubuntu-latest (GitHub Actions)"
          echo "========================================="
