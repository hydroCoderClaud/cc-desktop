name: Test Qiniu Upload Speed

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest
    env:
      QINIU_AK: ${{ secrets.QINIU_ACCESS_KEY }}
      QINIU_SK: ${{ secrets.QINIU_SECRET_KEY }}
      BUCKET: cc-desktop-releases
    steps:
      - name: Generate test files
        run: |
          echo "=== Generating test files ==="
          dd if=/dev/urandom of=test-140mb.bin bs=1M count=140
          dd if=/dev/urandom of=test-150mb.bin bs=1M count=150
          dd if=/dev/urandom of=test-blockmap.bin bs=1K count=150
          echo "version: 1.6.69" > test-latest.yml
          ls -lh test-*

      - name: Setup Python and qiniu SDK
        run: pip install qiniu

      - name: Upload all test files
        run: |
          python3 << 'PYEOF'
          import qiniu, time, os

          ak = os.environ['QINIU_AK']
          sk = os.environ['QINIU_SK']
          bucket = os.environ['BUCKET']
          auth = qiniu.Auth(ak, sk)

          # 华东-浙江 区域配置
          config = qiniu.config.Config()
          config.zone = qiniu.zone.Zone(
              up_host="https://up-cn-east-2.qiniup.com",
              up_host_backup="https://upload-cn-east-2.qiniup.com"
          )

          files = [
              ("test-140mb.bin", "Windows exe ~140MB"),
              ("test-150mb.bin", "macOS dmg ~150MB"),
              ("test-blockmap.bin", "blockmap ~150KB"),
              ("test-latest.yml", "latest.yml ~1KB"),
          ]

          print("=" * 50)
          for fname, label in files:
              size_bytes = os.path.getsize(fname)
              size_mb = size_bytes / (1024 * 1024)
              token = auth.upload_token(bucket, fname, 3600)

              start = time.time()
              ret, info = qiniu.put_file(token, fname, fname, config=config)
              elapsed = time.time() - start

              status = "OK" if info.status_code == 200 else f"FAIL({info.status_code})"
              speed = size_mb / elapsed if elapsed > 0 else 0
              print(f"[{status}] {label}: {elapsed:.1f}s, {speed:.1f} MB/s")

              if info.status_code != 200:
                  print(f"  Error: {info.text_body}")
          print("=" * 50)
          PYEOF
