name: Test OSS Upload

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to test (e.g., v1.7.36)'
        required: true
        default: 'v1.7.36'

env:
  OSS_DIR: hydrodesktop_update

jobs:
  test-oss-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install ossutil
        run: |
          wget -q https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64 -O /tmp/ossutil
          chmod +x /tmp/ossutil

      - name: Configure ossutil
        run: |
          cat > /tmp/.ossutilconfig << EOF
          [Credentials]
          language=CH
          endpoint=oss-cn-hangzhou.aliyuncs.com
          accessKeyID=${{ secrets.OSS_ACCESS_KEY_ID }}
          accessKeySecret=${{ secrets.OSS_ACCESS_KEY_SECRET }}
          EOF
          echo "ossutil config created successfully"
          cat /tmp/.ossutilconfig

      - name: Download artifacts from release
        run: |
          mkdir -p artifacts

          # 从 GitHub Release 下载构建产物
          VERSION="${{ github.event.inputs.version }}"
          echo "Downloading artifacts for $VERSION..."

          # 使用 gh CLI 下载 release 资产
          gh release download "$VERSION" --repo "${{ github.repository }}" --pattern "*.exe" --dir artifacts || true
          gh release download "$VERSION" --repo "${{ github.repository }}" --pattern "*.dmg" --dir artifacts || true
          gh release download "$VERSION" --repo "${{ github.repository }}" --pattern "*.zip" --dir artifacts || true
          gh release download "$VERSION" --repo "${{ github.repository }}" --pattern "*.blockmap" --dir artifacts || true
          gh release download "$VERSION" --repo "${{ github.repository }}" --pattern "latest.yml" --dir artifacts || true
          gh release download "$VERSION" --repo "${{ github.repository }}" --pattern "latest-mac.yml" --dir artifacts || true

          echo "Download complete. Files:"
          ls -la artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Aliyun OSS
        run: |
          echo "=== Uploading to Aliyun OSS ==="

          # 清理旧文件（保留 blockmap 和 yml）
          echo "Cleaning old files from OSS (keeping blockmaps and yml)..."
          /tmp/ossutil rm -r -b -f -c /tmp/.ossutilconfig oss://${{ secrets.OSS_BUCKET_NAME }}/${{ env.OSS_DIR }}/ \
            --exclude "*.blockmap" --exclude "*.yml" || true

          # 上传文件
          echo "Uploading files to OSS..."
          /tmp/ossutil cp -r -f -c /tmp/.ossutilconfig artifacts/ oss://${{ secrets.OSS_BUCKET_NAME }}/${{ env.OSS_DIR }}/

          echo "=== Aliyun OSS upload complete ==="
          /tmp/ossutil ls -c /tmp/.ossutilconfig oss://${{ secrets.OSS_BUCKET_NAME }}/${{ env.OSS_DIR }}/
