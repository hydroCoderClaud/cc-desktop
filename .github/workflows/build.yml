name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.1.8) - will create tag and release'
        required: false
        default: ''
      skip_macos:
        description: 'Skip macOS build'
        type: boolean
        required: false
        default: false

env:
  CI: true
  R2_BUCKET: cc-desktop-releases
  OSS_DIR: hydrodesktop_update

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-windows:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue
        run: npm run build:vue

      - name: Build Electron
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Windows installer package
        shell: pwsh
        run: |
          # 获取版本号
          $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          $RELEASE_DIR = "cc-desktop-${VERSION}-windows"

          # 创建发布目录
          New-Item -ItemType Directory -Force -Path $RELEASE_DIR | Out-Null

          # 复制文件 - 查找 exe 文件（支持多种命名格式）
          $exeFile = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          if ($exeFile) {
            Write-Host "Found installer: $($exeFile.Name)"
            Copy-Item $exeFile.FullName "$RELEASE_DIR\CC Desktop Setup ${VERSION}.exe"
          } else {
            Write-Error "No .exe file found in dist/"
            exit 1
          }
          Copy-Item "scripts\install.ps1" "$RELEASE_DIR\"

          # 创建 README
          @"
          # CC Desktop v${VERSION} - Windows Installer

          ## Quick Install (Recommended)

          Right-click PowerShell and "Run as Administrator", then:

          ``````powershell
          powershell -ExecutionPolicy Bypass -File .\install.ps1
          ``````

          This will:
          1. Check if Claude Code CLI is installed (install if not)
          2. Launch CC Desktop installer

          ## Manual Install

          Double-click ``CC Desktop Setup ${VERSION}.exe``
          "@ | Out-File -FilePath "$RELEASE_DIR\README.md" -Encoding UTF8

          # 打包
          Compress-Archive -Path $RELEASE_DIR -DestinationPath "dist\cc-desktop-${VERSION}-windows.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
            dist/cc-desktop-*-windows.zip
          if-no-files-found: ignore

  build-macos:
    needs: test
    runs-on: macos-latest
    timeout-minutes: 30
    if: ${{ github.event.inputs.skip_macos != 'true' }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue
        run: npm run build:vue

      - name: Build Electron
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create macOS installer package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_DIR="cc-desktop-${VERSION}-macos"

          mkdir -p "$RELEASE_DIR"
          # DMG 文件（手动安装用）- 用 find 动态查找，不依赖硬编码文件名
          find dist -name "*.dmg" -exec cp {} "$RELEASE_DIR/" \;
          cp scripts/install.sh "$RELEASE_DIR/"

          # 注意：ZIP 文件不放入 tar.gz，直接上传到 Release（用于自动更新）

          # 创建 README
          cat > "$RELEASE_DIR/README.md" << EOF
          # CC Desktop v${VERSION} - macOS Installer

          ## Quick Install (Recommended)

          \`\`\`bash
          bash install.sh
          \`\`\`

          This will:
          1. Detect your system architecture (ARM64 or x64)
          2. Check if Claude Code CLI is installed (install if not)
          3. Install CC Desktop to /Applications

          ## Manual Install

          - **Apple Silicon (M1/M2/M3)**: \`CC-Desktop-${VERSION}-darwin-arm64.dmg\`
          - **Intel**: \`CC-Desktop-${VERSION}-darwin-x64.dmg\`
          EOF

          # 打包
          tar czf "dist/cc-desktop-${VERSION}-macos.tar.gz" "$RELEASE_DIR"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
            dist/cc-desktop-*-macos.tar.gz
          if-no-files-found: ignore

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    # 触发条件：推送 tag 或手动触发时填写了版本号
    # Windows 必须成功，macOS 可以跳过（skip_macos）或成功
    if: ${{ always() && needs.build-windows.result == 'success' && (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != '') }}

    permissions:
      contents: write

    steps:
      - name: Clean up draft releases
        run: |
          echo "Cleaning up draft releases..."
          DRAFTS=$(gh api repos/${{ github.repository }}/releases --jq '.[] | select(.draft==true) | .id')
          for id in $DRAFTS; do
            echo "Deleting draft release $id"
            gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
          done
          echo "Done. Deleted $(echo "$DRAFTS" | grep -c . || echo 0) draft(s)."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "number=${TAG#v}" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG, version number: ${TAG#v}"

      - name: Create tag (if manual trigger)
        if: ${{ github.event.inputs.version != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }} 2>/dev/null || true
          git push origin ${{ steps.version.outputs.tag }} 2>/dev/null || echo "Tag already exists, skipping push"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Extract changelog and inject release notes
        id: changelog
        run: |
          node -e "
          const fs = require('fs');
          const version = process.env.VERSION;

          // 从 CHANGELOG.md 提取当前版本的更新说明
          const changelog = fs.readFileSync('docs/CHANGELOG.md', 'utf8');
          const escaped = version.replace(/\./g, '\\\\.');
          const regex = new RegExp('## v' + escaped + '[^\\\\n]*\\\\n([\\\\s\\\\S]*?)(?=\\\\n---|$)');
          const match = changelog.match(regex);
          const notes = match ? match[1].trim() : '';

          if (!notes) {
            console.log('No changelog notes found for v' + version + ', skipping');
            // 写入空值，release body 会使用 fallback
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'notes=\n');
            process.exit(0);
          }
          console.log('Changelog notes (' + notes.length + ' chars): ' + notes.slice(0, 80) + '...');

          // 写入 GITHUB_OUTPUT（多行值用 delimiter）
          const delimiter = 'CHANGELOG_EOF_' + Date.now();
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'notes<<' + delimiter + '\n' + notes + '\n' + delimiter + '\n');

          // 注入到 latest-mac.yml 和 latest.yml（generic provider 从此字段读取更新说明）
          const ymlFiles = [
            'artifacts/mac-build/latest-mac.yml',
            'artifacts/win-build/latest.yml',
          ];
          for (const f of ymlFiles) {
            if (!fs.existsSync(f)) { console.log('Skip (not found):', f); continue; }
            let content = fs.readFileSync(f, 'utf8');
            content = content.replace(/^releaseNotes:.*\n/m, '');
            content = content.trimEnd() + '\nreleaseNotes: ' + JSON.stringify(notes) + '\n';
            fs.writeFileSync(f, content);
            console.log('Injected releaseNotes into:', f);
          }
          "
        env:
          VERSION: ${{ steps.version.outputs.number }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.blockmap
            artifacts/**/latest.yml
            artifacts/**/latest-mac.yml
            artifacts/**/cc-desktop-*-macos.tar.gz
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
          body: |
            ## 🚀 CC Desktop ${{ steps.version.outputs.tag }}

            ### 📝 更新内容

            ${{ steps.changelog.outputs.notes || '> 详情请查看 [CHANGELOG](docs/CHANGELOG.md)' }}

            ### 📦 一键安装

            #### Windows
            下载 `cc-desktop-*-windows.zip`，解压后右键 PowerShell "以管理员身份运行"：
            ```powershell
            powershell -ExecutionPolicy Bypass -File .\install.ps1
            ```

            #### macOS
            下载 `cc-desktop-*-macos.tar.gz`，解压后运行：
            ```bash
            bash install.sh
            ```

            ### 🇨🇳 镜像站下载（China Mirror）
            - **Windows**: [cc-desktop-${{ steps.version.outputs.number }}-windows.zip](https://hdupdate.myseek.fun/hydrodesktop_update/cc-desktop-${{ steps.version.outputs.number }}-windows.zip)
            - **macOS**: [cc-desktop-${{ steps.version.outputs.number }}-macos.tar.gz](https://hdupdate.myseek.fun/hydrodesktop_update/cc-desktop-${{ steps.version.outputs.number }}-macos.tar.gz)

            ### ✨ 功能特性
            - 双模式架构：开发者模式（CLI界面）+ Agent 模式（Chat界面）
            - 多会话管理
            - 支持恢复历史会话
            - 内置 Agent 对话界面

            ### 📋 系统要求
            - **Windows**: Windows 10/11
            - **macOS**: 10.13+
            - Node.js, Claude Code CLI（安装脚本会自动检查和安装）
            - 运行 exe 或者 dmg 安装包时不自动检测，请提前手动安装 Node.js, Claude Code CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to R2 (China mirror)
        run: |
          echo "=== Uploading to Cloudflare R2 ==="
          VERSION="${{ steps.version.outputs.tag }}"

          # 清理旧的大文件（exe/dmg/zip/tar.gz），保留 blockmap（差分更新需要上一版本的 blockmap）
          echo "Cleaning old large files (keeping blockmaps)..."
          aws s3 ls "s3://${{ env.R2_BUCKET }}/" --endpoint-url "${{ secrets.R2_ENDPOINT }}" | \
            awk '{print $4}' | grep -v '\.blockmap$' | grep -v '\.yml$' | while read -r f; do
              [ -z "$f" ] && continue
              echo "Deleting: $f"
              aws s3 rm "s3://${{ env.R2_BUCKET }}/$f" --endpoint-url "${{ secrets.R2_ENDPOINT }}"
            done || true

          # 上传所有构建产物到 R2（flat 目录，electron-updater 需要）
          for f in artifacts/**/*.exe artifacts/**/*.dmg artifacts/**/*.zip artifacts/**/*.blockmap artifacts/**/latest.yml artifacts/**/latest-mac.yml artifacts/**/cc-desktop-*-macos.tar.gz artifacts/**/cc-desktop-*-windows.zip; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            echo "Uploading: $BASENAME"
            aws s3 cp "$f" "s3://${{ env.R2_BUCKET }}/$BASENAME" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          done

          # 生成下载引导页
          VER="${{ steps.version.outputs.number }}"
          cat > /tmp/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>CC Desktop 国内镜像下载</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
              .container { max-width: 600px; width: 90%; padding: 48px 40px; background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
              h1 { font-size: 24px; margin-bottom: 8px; }
              .version { color: #666; font-size: 14px; margin-bottom: 32px; }
              .section { margin-bottom: 24px; }
              .section h2 { font-size: 16px; color: #333; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
              a.dl { display: block; padding: 12px 16px; margin-bottom: 8px; background: #f5f5f0; border-radius: 8px; color: #1a1a1a; text-decoration: none; transition: background 0.2s; }
              a.dl:hover { background: #e8e8e0; }
              a.dl .name { font-weight: 600; }
              a.dl .hint { font-size: 13px; color: #888; }
              .footer { margin-top: 32px; font-size: 13px; color: #999; text-align: center; }
              .footer a { color: #666; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>CC Desktop</h1>
              <div class="version">v${VER} · 国内镜像</div>
              <div class="section">
                <h2>Windows</h2>
                <a class="dl" href="CC-Desktop-${VER}-win32-x64.exe"><span class="name">CC-Desktop-${VER}-win32-x64.exe</span><br><span class="hint">安装包</span></a>
              </div>
              <div class="section">
                <h2>macOS</h2>
                <a class="dl" href="CC-Desktop-${VER}-darwin-arm64.dmg"><span class="name">CC-Desktop-${VER}-darwin-arm64.dmg</span><br><span class="hint">Apple Silicon (M1/M2/M3/M4)</span></a>
                <a class="dl" href="CC-Desktop-${VER}-darwin-x64.dmg"><span class="name">CC-Desktop-${VER}-darwin-x64.dmg</span><br><span class="hint">Intel</span></a>
              </div>
              <div class="footer">
                <a href="https://github.com/hydroCoderClaud/cc-desktop" target="_blank">GitHub</a>
              </div>
            </div>
          </body>
          </html>
          HTMLEOF
          aws s3 cp /tmp/index.html "s3://${{ env.R2_BUCKET }}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"

          echo "=== R2 upload complete ==="
          aws s3 ls "s3://${{ env.R2_BUCKET }}/" --endpoint-url "${{ secrets.R2_ENDPOINT }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Upload to Aliyun OSS (China mirror)
        run: |
          echo "=== Uploading to Aliyun OSS ==="
          VERSION="${{ steps.version.outputs.tag }}"

          # 清理旧的大文件（保留 blockmap 和 yml）
          echo "Cleaning old files from OSS (keeping blockmaps and yml)..."
          aws s3 ls "s3://${{ secrets.OSS_BUCKET_NAME }}/${{ env.OSS_DIR }}/" \
            --endpoint-url "https://${{ secrets.OSS_ENDPOINT }}" | \
            awk '{print $4}' | grep -v '\.blockmap$' | grep -v '\.yml$' | while read -r f; do
              [ -z "$f" ] && continue
              echo "Deleting: $f"
              aws s3 rm "s3://${{ secrets.OSS_BUCKET_NAME }}/${{ env.OSS_DIR }}/$f" \
                --endpoint-url "https://${{ secrets.OSS_ENDPOINT }}"
            done || true

          # 上传所有构建产物到 OSS（flat 目录，electron-updater 需要）
          for f in artifacts/**/*.exe artifacts/**/*.dmg artifacts/**/*.zip artifacts/**/*.blockmap artifacts/**/latest.yml artifacts/**/latest-mac.yml artifacts/**/cc-desktop-*-macos.tar.gz artifacts/**/cc-desktop-*-windows.zip; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            echo "Uploading: $BASENAME"
            aws s3 cp "$f" "s3://${{ secrets.OSS_BUCKET_NAME }}/${{ env.OSS_DIR }}/$BASENAME" \
              --endpoint-url "https://${{ secrets.OSS_ENDPOINT }}"
          done

          echo "=== Aliyun OSS upload complete ==="
          aws s3 ls "s3://${{ secrets.OSS_BUCKET_NAME }}/${{ env.OSS_DIR }}/" \
            --endpoint-url "https://${{ secrets.OSS_ENDPOINT }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Clean up old releases (keep latest 10)
        run: |
          echo "Fetching all releases..."
          RELEASES=$(gh api repos/${{ github.repository }}/releases --paginate --jq '.[].id')
          COUNT=0
          for id in $RELEASES; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 10 ]; then
              TAG=$(gh api "repos/${{ github.repository }}/releases/$id" --jq '.tag_name')
              echo "Deleting old release: $TAG (id: $id)"
              gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
              # 同时删除对应 tag
              if [ -n "$TAG" ]; then
                gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$TAG" 2>/dev/null || true
              fi
            fi
          done
          echo "Done. Kept 10, deleted $((COUNT > 10 ? COUNT - 10 : 0)) old release(s)."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
